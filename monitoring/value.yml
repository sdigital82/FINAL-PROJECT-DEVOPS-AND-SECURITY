#Prometheus Configuration (GitLab Monitoring and NodePort)
prometheus:
  prometheusSpec:
    additionalScrapeConfigs:
      - job_name: 'gitlab-host-node'
        static_configs:
          - targets: ['192.168.109.146:9100']
      - job_name: 'gitlab-host-docker'
        static_configs:
          - targets: ['192.168.109.146:9323']
  service:
    type: NodePort
    nodePort: 30081

#Grafana Configuration (Dashboards and NodePort)
grafana:
  defaultDashboardsEnabled: true
  service:
    type: NodePort
    nodePort: 30082

