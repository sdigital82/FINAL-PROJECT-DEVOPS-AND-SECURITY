apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-k8s
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend-k8s
  template:
    metadata:
      labels:
        app: frontend-k8s
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: frontend
        image: {{ FRONTEND_IMAGE }}
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        volumeMounts:
        - name: frontend-storage
          mountPath: /usr/share/nginx/html/storage
      volumes:
      - name: frontend-storage
        persistentVolumeClaim:
          claimName: frontend-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  selector:
    app: frontend-k8s
  ports:
  - port: 80 #service port
    targetPort: 80   # pod container port
    nodePort: 30080  # host's port that the service binds to
